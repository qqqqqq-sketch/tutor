<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 每日打卡圖鑑 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #FF8FAB;
  --pink-light: #FFD6E5;
  --purple: #C084FC;
  --blue: #93C5FD;
  --gold: #FBBF24;
  --bg: linear-gradient(135deg, #FFE4F0 0%, #EEF2FF 50%, #F0FDF4 100%);
  --card-bg: rgba(255,255,255,0.92);
  --text: #4A3555;
  --text-light: #9B8FA8;
  --radius: 18px;
  --shadow: 0 8px 32px rgba(180,100,160,.13);
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
}

/* ── bg deco ── */
.bg-deco { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg-deco span {
  position: absolute; font-size: 2rem; opacity: .07; animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
  10%  { opacity: .07; }
  90%  { opacity: .07; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ── screens ── */
.screen { position: relative; z-index: 1; }
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
#main-screen { display: none; padding: 20px 16px 60px; max-width: 980px; margin: 0 auto; }

/* ── loading overlay ── */
#loading-overlay {
  display: none; position: fixed; inset: 0; z-index: 80;
  background: rgba(255,240,252,.92);
  backdrop-filter: blur(8px);
  align-items: center; justify-content: center; flex-direction: column; gap: 14px;
}
#loading-overlay.show { display: flex; }
.spinner { font-size: 3rem; animation: spin 1.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: .9rem; font-weight: 700; color: var(--text-light); }

/* ── setup notice ── */
.setup-notice {
  background: #FFFBEB; border: 2px solid var(--gold);
  border-radius: 12px; padding: 14px 18px;
  font-size: .84rem; font-weight: 700; color: #92400E;
  margin-bottom: 18px; display: none; line-height: 1.7;
}
.setup-notice.show { display: block; }
.setup-notice code {
  background: rgba(0,0,0,.07); border-radius: 4px; padding: 1px 5px;
  font-family: monospace; font-size: .9em;
}

/* ── login card ── */
.login-card {
  background: var(--card-bg); border-radius: 28px; padding: 48px 40px;
  text-align: center; box-shadow: 0 24px 64px rgba(255,100,160,.18);
  max-width: 420px; width: 100%; backdrop-filter: blur(10px);
  animation: popIn .5s cubic-bezier(.17,.67,.4,1.3);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.85) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.login-emoji  { font-size: 4rem; margin-bottom: 12px; }
.login-title  { font-size: 1.9rem; font-weight: 900; color: var(--pink); margin-bottom: 6px; }
.login-sub    { color: var(--text-light); font-size: .9rem; margin-bottom: 28px; }

.input-wrap { position: relative; margin-bottom: 14px; }
.input-wrap input {
  width: 100%; padding: 14px 20px;
  border: 2px solid #EDD9F0; border-radius: 50px;
  font-size: 1rem; font-family: inherit; color: var(--text);
  outline: none; transition: border-color .2s, box-shadow .2s; background: #FFF8FC;
}
.input-wrap input:focus { border-color: var(--pink); box-shadow: 0 0 0 4px rgba(255,143,171,.15); }
.input-wrap input::placeholder { color: #CDB9D8; }
.input-wrap input:disabled { opacity: .5; cursor: not-allowed; }

.btn-primary {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #FF8FAB, #C084FC);
  color: white; border: none; border-radius: 50px;
  font-size: 1.05rem; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 6px 20px rgba(255,143,171,.4); margin-top: 8px;
}
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,143,171,.5); }
.btn-primary:active:not(:disabled) { transform: scale(.97); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

/* ── main header ── */
.main-header {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 18px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 12px;
  box-shadow: var(--shadow); margin-bottom: 16px; backdrop-filter: blur(10px);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; flex-shrink: 0;
}
.header-name { font-size: 1.05rem; font-weight: 800; }
.header-sub  { font-size: .78rem; color: var(--text-light); margin-top: 2px; }
.progress-badge {
  background: linear-gradient(135deg, #FFF0F5, #F5F0FF);
  border: 2px solid #EDD9F0; border-radius: 50px;
  padding: 7px 16px; text-align: center;
  font-size: .82rem; font-weight: 700; color: var(--purple);
}
.progress-badge strong { font-size: 1.2rem; color: var(--pink); }
.btn-logout {
  background: none; border: 2px solid #EDD9F0; border-radius: 50px;
  padding: 7px 14px; font-size: .78rem; font-weight: 700;
  color: var(--text-light); cursor: pointer; font-family: inherit; transition: all .2s;
}
.btn-logout:hover { border-color: var(--pink); color: var(--pink); }

/* ── tabs ── */
.tabs { display: flex; gap: 8px; margin-bottom: 18px; }
.tab-btn {
  flex: 1; padding: 12px 16px; border-radius: 50px;
  font-size: .88rem; font-weight: 800; font-family: inherit;
  cursor: pointer; border: 2px solid transparent; transition: all .2s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: white; box-shadow: 0 6px 16px rgba(255,143,171,.35);
}
.tab-btn:not(.active) {
  background: var(--card-bg); color: var(--text-light); border-color: #EDD9F0;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── action panel ── */
.action-panel {
  background: var(--card-bg); border-radius: var(--radius);
  padding: 22px 24px; box-shadow: var(--shadow); margin-bottom: 24px;
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-wrap: wrap; gap: 20px; backdrop-filter: blur(10px);
}
.action-label { font-size: .8rem; color: var(--text-light); font-weight: 700; margin-bottom: 8px; }

/* checkin */
.checkin-btn {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #93C5FD, #6EE7B7);
  color: white; border: none; border-radius: 50px;
  padding: 11px 22px; font-size: .9rem; font-weight: 800;
  font-family: inherit; cursor: pointer; display: inline-block;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 6px 16px rgba(100,180,255,.3);
}
.checkin-btn:hover { transform: translateY(-2px); }
.checkin-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.checkin-done {
  display: inline-flex; align-items: center; gap: 8px;
  background: #F0FDF4; border: 2px solid #86EFAC;
  border-radius: 50px; padding: 10px 18px;
  font-size: .9rem; font-weight: 800; color: #16A34A;
}
.note-wrap { margin-top: 10px; }
.note-wrap textarea {
  width: 100%; padding: 9px 13px;
  border: 2px solid #EDD9F0; border-radius: 12px;
  font-family: inherit; font-size: .82rem; color: var(--text);
  resize: none; height: 62px; outline: none;
  transition: border-color .2s; background: #FFF8FC;
}
.note-wrap textarea:focus { border-color: var(--pink); }
.note-preview { font-size: .78rem; color: var(--text-light); margin-top: 6px; line-height: 1.5; }
.checkin-uploading {
  display: inline-flex; align-items: center; gap: 8px;
  background: #EFF6FF; border: 2px solid #93C5FD;
  border-radius: 50px; padding: 10px 18px;
  font-size: .9rem; font-weight: 800; color: #1D4ED8;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
.checkin-fail {
  display: inline-flex; align-items: center; gap: 8px;
  background: #FFF1F1; border: 2px solid #FCA5A5;
  border-radius: 50px; padding: 10px 18px;
  font-size: .9rem; font-weight: 800; color: #DC2626;
}

/* draw */
.draw-btn {
  background: linear-gradient(135deg, #FF8FAB, #FBBF24, #C084FC);
  background-size: 200% 200%; animation: gradShift 3s ease infinite;
  color: white; border: none; border-radius: 50px;
  padding: 13px 36px; font-size: 1.05rem; font-weight: 900;
  font-family: inherit; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 8px 24px rgba(255,143,171,.45);
}
@keyframes gradShift {
  0%,100% { background-position: 0% 50%; }
  50%     { background-position: 100% 50%; }
}
.draw-btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); box-shadow: 0 14px 32px rgba(255,143,171,.55); }
.draw-btn:active:not(:disabled) { transform: scale(.97); }
.draw-btn:disabled {
  background: linear-gradient(135deg, #E5D5EB, #D5D5E8);
  animation: none; box-shadow: none; cursor: not-allowed; color: #B9A8C8;
}
.draw-hint { font-size: .76rem; color: var(--text-light); margin-top: 6px; }

/* ── card grid ── */
.section-title {
  font-size: 1.1rem; font-weight: 900; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}
.card {
  background: var(--card-bg); border-radius: 16px;
  padding: 16px 10px 12px; text-align: center;
  box-shadow: 0 4px 16px rgba(180,100,160,.08);
  transition: transform .2s, box-shadow .2s;
  position: relative; overflow: hidden;
  border: 2px solid transparent;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(180,100,160,.15); }
.card.locked {
  background: rgba(210,200,220,.5); filter: grayscale(1);
}
.card.locked:hover { transform: translateY(-2px); }
.card.rarity-rare   { border-color: rgba(192,132,252,.35); }
.card.rarity-legend { border-color: rgba(251,191,36,.5); }
.card.rarity-legend::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,220,80,.12) 50%, transparent 70%);
  animation: shine 2.5s ease infinite;
}
@keyframes shine {
  0%   { transform: translateX(-100%) skewX(-15deg); }
  50%,100% { transform: translateX(200%) skewX(-15deg); }
}
.card-emoji { font-size: 2.6rem; margin-bottom: 7px; display: block; transition: transform .2s; }
.card:hover .card-emoji { transform: scale(1.1) rotate(-4deg); }
.card.locked .card-emoji { filter: blur(2px) brightness(.3); }
/* 圖片卡片 */
.card-img {
  width: 68px; height: 68px; object-fit: cover;
  border-radius: 10px; margin-bottom: 7px; display: block;
  transition: transform .2s; margin-left: auto; margin-right: auto;
}
.card:hover .card-img { transform: scale(1.08) rotate(-3deg); }
.card.locked .card-img { filter: blur(4px) brightness(.2); }
/* 大圖（抽獎翻牌用） */
.result-img {
  width: 112px; height: 112px; object-fit: cover; border-radius: 14px;
  animation: popIn .4s cubic-bezier(.17,.67,.4,1.4) .85s both;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.card-name { font-size: .78rem; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card.locked .card-name { color: #A090B0; }
.card-stars { font-size: .66rem; margin-top: 4px; letter-spacing: 1px; }
.card.locked .card-stars { filter: opacity(.3); }
.rarity-label {
  position: absolute; top: 7px; right: 7px;
  font-size: .58rem; font-weight: 800; padding: 2px 6px;
  border-radius: 50px; text-transform: uppercase;
}
.card.rarity-common .rarity-label { background: #FCE7F3; color: #DB2777; }
.card.rarity-rare   .rarity-label { background: #F3E8FF; color: #9333EA; }
.card.rarity-legend .rarity-label { background: #FEF3C7; color: #D97706; }
.card.locked .rarity-label { display: none; }
.card-new-badge {
  position: absolute; top: -6px; left: -6px;
  background: linear-gradient(135deg, #FF8FAB, #FBBF24);
  color: white; font-size: .58rem; font-weight: 900;
  padding: 3px 8px; border-radius: 50px;
  box-shadow: 0 2px 8px rgba(255,100,100,.35);
  animation: bounce .5s ease infinite alternate;
}
@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.12); } }

/* ── leaderboard ── */
.lb-wrap {
  background: var(--card-bg); border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
  backdrop-filter: blur(10px);
}
.lb-topbar {
  padding: 16px 20px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid #F0E8F8;
}
.lb-title-text { font-size: 1rem; font-weight: 900; }
.btn-refresh {
  background: none; border: 2px solid #EDD9F0; border-radius: 50px;
  padding: 6px 14px; font-size: .78rem; font-weight: 700;
  color: var(--text-light); cursor: pointer; font-family: inherit; transition: all .2s;
}
.btn-refresh:hover { border-color: var(--pink); color: var(--pink); }
.lb-update { font-size: .72rem; color: var(--text-light); padding: 6px 20px 0; }
.lb-item {
  padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid #F5EFF8; transition: background .15s;
}
.lb-item:last-child { border-bottom: none; }
.lb-item.me { background: linear-gradient(90deg, #FFF0F8, transparent); }
.lb-rank { font-size: 1.25rem; width: 34px; text-align: center; flex-shrink: 0; font-weight: 900; }
.lb-info { flex: 1; min-width: 0; }
.lb-name { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: .95rem; }
.lb-me-tag { font-size: .65rem; background: var(--pink-light); color: var(--pink); padding: 1px 7px; border-radius: 50px; font-weight: 800; margin-left: 6px; }
.lb-draws { font-size: .7rem; color: var(--text-light); margin-top: 2px; }
.lb-right { text-align: right; flex-shrink: 0; }
.lb-points { font-size: 1.2rem; font-weight: 900; color: var(--pink); line-height: 1; }
.lb-pts-label { font-size: .65rem; color: var(--text-light); font-weight: 700; }
.lb-empty { padding: 48px 24px; text-align: center; color: var(--text-light); font-size: .92rem; }

/* ── draw modal ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(28,12,38,.78);
  backdrop-filter: blur(7px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
}
.modal-overlay.show { display: flex; }
.scene { width: 200px; height: 265px; perspective: 800px; cursor: pointer; }
.card-3d {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform .85s cubic-bezier(.4,0,.2,1);
}
.card-3d.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0; border-radius: 20px;
  backface-visibility: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px;
}
.card-back {
  background: linear-gradient(135deg, #7C3AED, #DB2777);
  box-shadow: 0 20px 50px rgba(120,50,200,.5);
  position: relative; overflow: hidden;
}
.card-back::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.04) 10px, rgba(255,255,255,.04) 12px);
}
.card-back-icon { font-size: 3.5rem; opacity: .3; z-index: 1; }
.card-back-text { font-size: 1rem; font-weight: 900; color: rgba(255,255,255,.85); z-index: 1; letter-spacing: .5px; }
.card-front {
  transform: rotateY(180deg); padding: 20px 16px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.card-front.rarity-common { background: linear-gradient(160deg, #FFF0F7, #FDEAFF); box-shadow: 0 20px 50px rgba(219,39,119,.3); }
.card-front.rarity-rare   { background: linear-gradient(160deg, #F5F0FF, #EEF2FF); box-shadow: 0 20px 50px rgba(124,58,237,.4); }
.card-front.rarity-legend { background: linear-gradient(160deg, #FFFBEB, #FFF7E6); box-shadow: 0 20px 50px rgba(251,191,36,.5); }
.result-emoji { font-size: 4.8rem; animation: popIn .4s cubic-bezier(.17,.67,.4,1.4) .85s both; }
.result-name  { font-size: 1.05rem; font-weight: 900; color: var(--text); animation: popIn .4s .95s both cubic-bezier(.17,.67,.4,1.4); }
.result-stars { font-size: .95rem; letter-spacing: 3px; animation: popIn .4s 1s both cubic-bezier(.17,.67,.4,1.4); }
.result-desc  { font-size: .74rem; color: #7A6880; text-align: center; padding: 0 4px; animation: popIn .4s 1.05s both cubic-bezier(.17,.67,.4,1.4); }
.result-dup-badge {
  background: rgba(255,143,171,.18); color: var(--pink);
  font-size: .68rem; font-weight: 800; padding: 3px 10px;
  border-radius: 50px; border: 1px solid rgba(255,143,171,.35);
  animation: popIn .4s 1.1s both;
}
.modal-hint { color: rgba(255,255,255,.65); font-size: .88rem; font-weight: 700; }
.modal-actions { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.modal-close-btn {
  background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.28);
  color: white; border-radius: 50px; padding: 11px 32px;
  font-size: .95rem; font-weight: 800; font-family: inherit;
  cursor: pointer; transition: background .2s; display: none;
}
.modal-close-btn.show { display: inline-block; }
.modal-close-btn:hover:not(:disabled) { background: rgba(255,255,255,.25); }
.modal-close-btn:disabled { opacity: .6; cursor: not-allowed; }
.submit-status { font-size: .8rem; color: rgba(255,255,255,.6); min-height: 1.3em; text-align: center; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-8px) rotate(-3deg); }
  40%     { transform: translateX(8px) rotate(3deg); }
  60%     { transform: translateX(-6px) rotate(-2deg); }
  80%     { transform: translateX(6px) rotate(2deg); }
}
.card-3d.shaking { animation: shake .5s ease; }

/* ── particles ── */
#particles { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
.particle {
  position: absolute; font-size: 1.2rem;
  animation: flyOut .8s ease-out forwards;
  pointer-events: none;
}
@keyframes flyOut {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx),var(--ty)) scale(.2); }
}

/* ── gashapon machine ── */
.machine-wrap {
  display: flex; justify-content: center;
  margin-bottom: 4px;
  animation: machFloat 3.5s ease-in-out infinite;
  cursor: default;
}
.machine-wrap:hover { animation-play-state: paused; }
@keyframes machFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
/* individual ball bob (SVG g elements) */
@keyframes ballBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.b1 { animation: ballBob 2.1s ease-in-out 0s    infinite; transform-box:fill-box; transform-origin:center; }
.b2 { animation: ballBob 2.5s ease-in-out .35s  infinite; transform-box:fill-box; transform-origin:center; }
.b3 { animation: ballBob 1.9s ease-in-out .7s   infinite; transform-box:fill-box; transform-origin:center; }
.b4 { animation: ballBob 2.7s ease-in-out .15s  infinite; transform-box:fill-box; transform-origin:center; }
.b5 { animation: ballBob 2.3s ease-in-out .9s   infinite; transform-box:fill-box; transform-origin:center; }
.b6 { animation: ballBob 2.0s ease-in-out .5s   infinite; transform-box:fill-box; transform-origin:center; }
/* handle glow pulse */
@keyframes handlePulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.25)} }
.handle-knob { animation: handlePulse 2s ease-in-out infinite; }

/* ── demo mode ── */
.btn-demo {
  width: 100%; padding: 11px; margin-top: 8px;
  background: none; border: 2px dashed #C084FC; border-radius: 50px;
  font-size: .85rem; font-weight: 700; font-family: inherit;
  color: var(--purple); cursor: pointer; transition: all .2s;
}
.btn-demo:hover { background: rgba(192,132,252,.1); border-style: solid; }
.demo-badge {
  background: #FEF3C7; border: 2px solid var(--gold);
  border-radius: 50px; padding: 4px 13px;
  font-size: .72rem; font-weight: 800; color: #92400E;
}

/* ── responsive ── */
@media (max-width: 600px) {
  .login-card { padding: 36px 22px; }
  .action-panel { flex-direction: column; }
  .draw-btn { width: 100%; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 9px; }
  .card { padding: 12px 7px 9px; }
  .card-emoji { font-size: 2rem; }
}
</style>
</head>

// ── 圖片壓縮（縮到 1024px 以內，JPEG 0.75，大幅減少 base64 體積）──
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = ev => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const MAX = 1200; // 最大 1200px，imgBB 支援高畫質
        let w = img.width, h = img.height;
        if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
        resolve(dataUrl.split(',')[1]); // base64 only
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── 上傳圖片到 imgBB，回傳可查看的 URL ───────────────────────
async function uploadToImgBB(file) {
  if (isDemoMode) {
    await new Promise(r => setTimeout(r, 700));
    return 'https://i.ibb.co/demo/photo.jpg';
  }
  const base64 = await compressImage(file);
  const form = new FormData();
  form.append('key', IMGBB_KEY);
  form.append('image', base64);
  form.append('name', `${currentStudent}_${today()}`);
  const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: form });
  const data = await res.json();
  if (data.success) return data.data.url;
  throw new Error(data.error?.message || '上傳失敗');
}

  checkinNote = document.getElementById('noteInput')?.value || '';
  const sec = document.getElementById('checkinSection');

  if (!file.type.startsWith('image/')) {
    // 非圖片：只記文字打卡
    imageData = '';
    localStorage.setItem(`ci_${currentStudent}_${today()}`, '1');
    localCheckedIn = true;
    sec.innerHTML = `<div class="checkin-done">✅ 打卡完成！</div>${checkinNote ? `<div class="note-preview">📝 ${escHtml(checkinNote)}</div>` : ''}`;
    renderDrawBtn();
    return;
  }

  sec.innerHTML = '<div class="checkin-uploading">⏳ 上傳圖片中，請稍候...</div>';

  try {
    imageData = await uploadToImgBB(file); // 拿到 imgBB 圖片 URL
    localStorage.setItem(`img_${currentStudent}_${today()}`, imageData); // 存起來防刷新遺失
  } catch(err) {
    console.error('imgBB 上傳失敗:', err);
    imageData = '';
    sec.innerHTML = `<div class="checkin-fail">⚠️ 圖片上傳失敗，仍可繼續抽獎</div>`;
    localStorage.setItem(`ci_${currentStudent}_${today()}`, '1');
    localCheckedIn = true;
    renderDrawBtn();
    return;
  }

  localStorage.setItem(`ci_${currentStudent}_${today()}`, '1');
  localCheckedIn = true;
  sec.innerHTML = `
    <div class="checkin-done">✅ 圖片已上傳！</div>
    ${checkinNote ? `<div class="note-preview">📝 ${escHtml(checkinNote)}</div>` : ''}
  `;
  renderDrawBtn();
  spawnParticles(['📸','✅','🌟'], 10);
}

// ── 抽獎按鈕 ──
function renderDrawBtn() {
  const btn  = document.getElementById('drawBtn');
  const hint = document.getElementById('drawHint');
  if (!localCheckedIn) {
    btn.disabled = true;
    hint.textContent = '請先上傳打卡才能抽獎';
  } else if (submittedToday) {
    btn.disabled = true;
    hint.textContent = '今日已抽過，明天再來 🌙';
  } else {
    btn.disabled = false;
    hint.textContent = '打卡完成，可以抽獎囉！';
  }
}

// ── 分頁切換 ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
  document.querySelectorAll('.tab-content').forEach(c =>
    c.classList.toggle('active', c.id === `tab-${tab}`)
  );
  if (tab === 'leaderboard') loadLeaderboard();
}

// ── 排行榜 ──
async function loadLeaderboard() {
  const list   = document.getElementById('lbList');
  const update = document.getElementById('lbUpdate');
  list.innerHTML = '<div class="lb-empty">載入中... ⏳</div>';
  update.textContent = '';
  try {
    const res = await api({ action: 'leaderboard' });
    renderLeaderboard(res.leaderboard || []);
    update.textContent = '更新於 ' + new Date().toLocaleTimeString('zh-TW');
  } catch(e) {
    list.innerHTML = `<div class="lb-empty">❌ 載入失敗：${escHtml(e.message)}<br><br>
      <button class="btn-refresh" onclick="loadLeaderboard()">重試</button></div>`;
  }
}

function renderLeaderboard(data) {
  const list   = document.getElementById('lbList');
  const medals = ['🥇','🥈','🥉'];
  if (!data.length) {
    list.innerHTML = '<div class="lb-empty">還沒有任何紀錄 🌱<br>第一個打卡抽獎的人就會出現在這裡！</div>';
    return;
  }
  list.innerHTML = data.map((item, i) => `
    <div class="lb-item ${item.name === currentStudent ? 'me' : ''}">
      <div class="lb-rank">${i < 3 ? medals[i] : `#${i+1}`}</div>
      <div class="lb-info">
        <div class="lb-name">
          ${escHtml(item.name)}
          ${item.name === currentStudent ? '<span class="lb-me-tag">我</span>' : ''}
        </div>
        <div class="lb-draws">抽過 ${item.draws} 次</div>
      </div>
      <div class="lb-right">
        <div class="lb-points">${item.points}</div>
        <div class="lb-pts-label">點數</div>
      </div>
    </div>
  `).join('');
}

// ── 圖鑑格子 ──
function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  CARDS.forEach(c => {
    const owned = myCards.has(c.id);
    const el = document.createElement('div');
    el.className = `card rarity-${c.rarity}${owned ? '' : ' locked'}`;
    el.dataset.id = c.id;
    el.innerHTML = `
      ${owned ? `<span class="rarity-label">${RARITY_LABEL[c.rarity]}</span>` : ''}
      ${cardMedia(c, 'grid')}
      <div class="card-name">${owned ? c.name : '???'}</div>
      <div class="card-stars">${STARS[c.rarity]}</div>
    `;
    if (owned) el.title = `${c.name} — ${c.desc}`;
    grid.appendChild(el);
  });
}

// ── 卡片媒體輔助（emoji 或 圖片）──
function cardMedia(c, mode) {
  // mode = 'grid'（小）或 'reveal'（大）
  if (c.img) {
    const cls = mode === 'reveal' ? 'result-img' : 'card-img';
    return `<img src="${c.img}" class="${cls}" alt="${c.name}" onerror="this.style.display='none'">`;
  }
  const cls = mode === 'reveal' ? 'result-emoji' : 'card-emoji';
  return `<span class="${cls}">${c.emoji || '🎴'}</span>`;
}

// ── 抽獎邏輯 ──
function pickCard() {
  const pool = [];
  CARDS.forEach(c => { for (let i = 0; i < WEIGHTS[c.rarity]; i++) pool.push(c); });
  return pool[Math.floor(Math.random() * pool.length)];
}

function openDraw() {
  if (document.getElementById('drawBtn').disabled) return;
  drawnCard = pickCard();
  revealed  = false;

  // 重置 modal
  const card3d = document.getElementById('card3d');
  card3d.classList.remove('flipped','shaking');
  document.getElementById('modalHint').textContent  = '點擊卡片翻開！';
  document.getElementById('modalCloseBtn').classList.remove('show');
  document.getElementById('modalCloseBtn').disabled = false;
  document.getElementById('cardFront').innerHTML    = '';
  document.getElementById('cardFront').className   = 'card-face card-front';
  document.getElementById('submitStatus').textContent = '';

  document.getElementById('drawModal').classList.add('show');
  setTimeout(() => {
    card3d.classList.add('shaking');
    setTimeout(() => card3d.classList.remove('shaking'), 520);
  }, 200);
}

function onCardClick() {
  if (revealed) return;
  const card3d = document.getElementById('card3d');
  if (card3d.classList.contains('shaking')) return;
  revealed = true;
  revealCard();
}

function revealCard() {
  const isDup  = myCards.has(drawnCard.id);
  const front  = document.getElementById('cardFront');
  front.className = `card-face card-front rarity-${drawnCard.rarity}`;
  front.innerHTML = `
    ${cardMedia(drawnCard, 'reveal')}
    <div class="result-name">${drawnCard.name}</div>
    <div class="result-stars">${STARS[drawnCard.rarity]}</div>
    <div class="result-desc">${drawnCard.desc}</div>
    ${isDup ? '<div class="result-dup-badge">✨ 重複收藏</div>' : ''}
  `;
  document.getElementById('card3d').classList.add('flipped');
  document.getElementById('modalHint').textContent =
    drawnCard.rarity === 'legend' ? '🌟 傳說卡！超稀有！' :
    drawnCard.rarity === 'rare'   ? '✨ 稀有卡！恭喜！'   : '🎉 加入圖鑑！';

  setTimeout(() => {
    document.getElementById('modalCloseBtn').classList.add('show');
    const emojis = drawnCard.rarity === 'legend' ? ['🌟','💫','✨','🎉','💎'] :
                   drawnCard.rarity === 'rare'   ? ['⭐','✨','🎊','💜'] : ['🎉','🌸','⭐','💕'];
    spawnParticles(emojis, 20);
  }, 1200);
}

// ── 收下並送出 ──
async function closeModal() {
  const btn    = document.getElementById('modalCloseBtn');
  const status = document.getElementById('submitStatus');
  btn.disabled    = true;
  status.textContent = imageData ? '送出中（含圖片）⏳' : '送出中（無圖片）⏳';

  try {
    const res = await api({
      action:    'submit',
      student:   currentStudent,
      date:      today(),
      note:      checkinNote,
      checkinImgUrl: imageData || '',  // imgBB 圖片連結
      cardId:    drawnCard.id,
      cardName:  drawnCard.name,
      rarity:    drawnCard.rarity
    });

    // 成功（若伺服器說重複也當成功，避免學生重複卡住）
    myCards.add(drawnCard.id);
    submittedToday = true;
    status.textContent = imageData ? '✅ 已送出（含圖片）' : '✅ 已送出（無圖片）'; // 診斷用

    await new Promise(r => setTimeout(r, 2000)); // 讓訊息停留 2 秒
    document.getElementById('drawModal').classList.remove('show');
    btn.disabled = false;
    const justDrawn = drawnCard;
    drawnCard = null;
    revealed  = false;

    renderMain();
    highlightNewCard(justDrawn.id);

  } catch(e) {
    btn.disabled = false;
    status.textContent = '❌ 送出失敗，請重試（' + e.message + '）';
  }
}

// 點擊 overlay 背景也能關閉（送出）
document.getElementById('drawModal').addEventListener('click', function(e) {
  if (e.target === this && document.getElementById('modalCloseBtn').classList.contains('show')) {
    closeModal();
  }
});

function highlightNewCard(id) {
  const el = document.querySelector(`.card[data-id="${id}"]`);
  if (!el) return;
  const badge = document.createElement('div');
  badge.className = 'card-new-badge'; badge.textContent = 'NEW!';
  el.appendChild(badge);
  setTimeout(() => badge.remove(), 4000);
  setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
}

// ── 粒子效果 ──
function spawnParticles(emojis, count = 12) {
  const container = document.getElementById('particles');
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className  = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle  = (Math.PI * 2 * i / count) + Math.random() * .5;
    const dist   = 120 + Math.random() * 160;
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', (Math.sin(angle) * dist - 80) + 'px');
    p.style.animationDelay = Math.random() * .3 + 's';
    p.style.fontSize = (.8 + Math.random() * .8) + 'rem';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

// ── 初始化 ──
(function init() {
  if (!SCRIPT_URL) document.getElementById('setupNotice').classList.add('show');

  // 背景裝飾
  const items = ['🌸','⭐','💫','✨','🌟','💕','🎀','🌈','🍀','💖'];
  const deco  = document.getElementById('bgDeco');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('span');
    s.textContent = items[Math.floor(Math.random() * items.length)];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top  = Math.random() * 100 + 'vh';
    s.style.animationDuration = (12 + Math.random() * 18) + 's';
    s.style.animationDelay    = -(Math.random() * 20) + 's';
    s.style.fontSize = (.8 + Math.random() * 1.5) + 'rem';
    deco.appendChild(s);
  }
})();
</script>
